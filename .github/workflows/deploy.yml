name: Build & Deploy Feishu Bitable Print Plugin
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 官方安装 pnpm，稳定
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # Node 22，关闭 cache（就不会报锁文件错误）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

name: Build & Deploy Feishu Bitable Print Plugin
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 官方 pnpm 安装，不依赖 setup-node 缓存
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 只装 Node，完全关闭缓存，不再检查锁文件
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

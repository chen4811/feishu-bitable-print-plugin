name: Build & Deploy Feishu Bitable Print Plugin
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 不指定版本，自动读取 package.json 里的 pnpm@9.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 关闭缓存，不再校验锁文件
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ''

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

name: Build & Deploy Feishu Bitable Print Plugin
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 用系统corepack，直接读取package.json指定的pnpm@9.0.0，不经过出错的pnpm/action-setup
      - name: Install pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: '' # 关闭缓存，跳过锁文件检查报错

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm build
        env:
          NODE_OPTIONS: "--no-deprecation" # 屏蔽punycode警告

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

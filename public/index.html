<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://*.feishu.cn https://*.larksuite.com; img-src 'self' data: blob: https://*.feishu.cn https://*.larksuite.com https://*.bytedance.com https://*.byteimg.com https://*.pstatp.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';">
  <title>飞书多维表格排版打印插件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      z-index: 9999;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #1890ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: #666;
      font-size: 14px;
    }

    .error {
      color: #ff4d4f;
      margin-top: 16px;
      padding: 10px 20px;
      border: 1px solid #ff4d4f;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">插件加载中...</div>
  </div>
  <div id="root"></div>
  <script>
    // 飞书插件初始化
    (function() {
      // 移除 loading
      function hideLoading() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.display = 'none';
        }
      }

      // 错误处理
      window.onerror = function(msg, url, line, col, error) {
        console.error('插件错误:', error);
        const loading = document.getElementById('loading');
        if (loading) {
          loading.innerHTML = `
            <div style="color: #ff4d4f; font-size: 14px;">
              插件加载失败<br>
              错误信息: ${msg}<br>
              请刷新页面重试
            </div>
          `;
        }
      };

      // 加载完成后隐藏 loading
      window.addEventListener('load', function() {
        setTimeout(hideLoading, 500);
      });
    })();
  </script>
</body>
</html>
